---
name: build (pip)

on: [push, pull_request]

jobs:
  test:
    name: pip ${{ matrix.os }} ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
        # zarr>=3 does not support py3.10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Pure pip install: all dependencies (including bioimage-cpp) are pulled from PyPI.
      # z5py is conda-only and not installed here; tests that need it are skipped.
      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: python -m unittest discover -s test -v
